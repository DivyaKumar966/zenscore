<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="icon" type="image/png" href="./logo.jpeg">
  <link rel="stylesheet" href="./page1.css">

</head>
<body>
<!-- partial:index.partial.html -->
<div class="box">
  <div class="login">
    <div class="loginBx">
      <h2>
        <i class="fa-solid fa-right-to-bracket"></i>
        LOGIN
        <i class="fa-solid fa-heart"></i>
      </h2>
      <input id="name" type="text" placeholder="Username">
      <input  id="pass" type="password" placeholder="Password">
      <input type="submit" value="Sign in" onclick="checkInput()" />
      <div class="group">
        <a href="#">Forgot Password</a>
        <a href="#">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script>

function checkInput(){
  let pass = document.getElementById("pass").value;
  let name = document.getElementById("name").value;

  if(name ==="" && pass ===""){
    alert("Plese Enter the Name and Password")
  }
  else if(pass ===""){
    alert("Enter password")
  }
  else if(name ===""){
    alert("Enter Name")
  }
  else{
    location.href = "page2.html?name=" + name + "&pass=" + pass;  }
}

</script>  
</body>
</html>
