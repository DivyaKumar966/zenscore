<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 3 </title>
</head>
<link rel="stylesheet" href="./page3.css">

<body>

    <div class="header">
        <div class="title">
            <h1>Student Database System</h1>
        </div>
        <div class="nav">
            <nav href="#">Home</nav>
            <nav href="#">About</nav>
            <nav href="#">Help</nav>
            <button>Logout</button>
        </div>
    </div>

    <div class="info">
        <h2 id="subjectCount"></h2>

    </div>
    <div class="info">
        <h2 id="showDept"></h2>
        <h2 id="showYear"></h2>
    </div>
    <div class="tables">
        <table id="subjectTable">
            <tr>
                <th>CODE</th>
                <th>SUBJECT</th>
                <th>FACULTY</th>
            </tr>
            <tr>
                <td>CCS351</td>
                <td>VIR</td>
                <td>VIJAY</td>
            </tr>
            <tr>
                <td>IT568</td>
                <td>UI/UX</td>
                <td>THARIQ</td>
            </tr>
            <tr>
                <td>CCS564</td>
                <td>OOSE</td>
                <td>IT HOD</td>
            </tr>
            <tr>
                <td>CCS667</td>
                <td>CSM</td>
                <td>CSE HOD</td>
            </tr>
            <tr>
                <td>CCS354</td>
                <td>NS</td>
                <td>MANIKANADHAN</td>
            </tr>
        </table>
    </div>
    <div class="buttons">
        <button type="button" id="backbtn" onclick="goback()">&#171; Back</button>
        <button type="button" id="editbtn" onclick="enableEdit()">Edit</button>
        <button type="button" id="savebtn" onclick="disableEdit()">Save</button>
        <button type="button" id="compbtn" onclick="gonext()">Next</button>
    </div>

    <footer class="footer">
        <p>© 2026 Student Database System | NSN CET</p>
    </footer>
    <script>


        let params = new URLSearchParams(window.location.search);

        let dept = params.get("dept");
        let year = params.get("year");

        document.getElementById("showDept").innerText = "Department : " + dept;
        document.getElementById("showYear").innerText = "Year : " + year;

        let table = document.getElementById("subjectTable");

        let count = table.rows.length - 1;

        document.getElementById("subjectCount").innerText =
            "SUBJECT NO : " + count;

        function enableEdit() {

            let table = document.getElementById("subjectTable");

            let cells = table.getElementsByTagName("td");

            for (let i = 0; i < cells.length; i++) { cells[i].contentEditable = true; cells[i].style.background = "#222"; }
            document.getElementById("backbtn").disabled = true;
            document.getElementById("compbtn").disabled = true; document.getElementById("editbtn").disabled = true;
            document.getElementById("savebtn").disabled = false;
        }

        function disableEdit() {
            let table = document.getElementById("subjectTable"); let cells = table.getElementsByTagName("td"); for (let i = 0; i <
                cells.length; i++) { cells[i].contentEditable = false; cells[i].style.background = "transparent"; }
            document.getElementById("backbtn").disabled = false;
            document.getElementById("compbtn").disabled = false; document.getElementById("editbtn").disabled = false;
            document.getElementById("savebtn").disabled = false;
        }

        function goback() {
            location.href = "page2.html";
        }
        function gonext() {
            location.href = "page4.html";
        }
    </script>
</body>

</html>
